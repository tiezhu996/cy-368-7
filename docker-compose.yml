name: ldairsoftcs

services:
  db:
    image: postgres:15
    container_name: ${COMPOSE_PROJECT_NAME:-ldairsoftcs}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-ldairsoftcs}-backend
    restart: unless-stopped
    environment:
      PORT: 29508
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT:-29508}:29508"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:29508/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    container_name: ${COMPOSE_PROJECT_NAME:-ldairsoftcs}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-28508}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
